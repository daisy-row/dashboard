name: Deploy Activity Dashboard

on:
  push:
    branches: [ gh-pages ]
  schedule:
    - cron: '0 4 * * *' # Run every hour to update data
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json
          
      - name: Install dependencies
        run: npm install
          
      - name: Build Dashboard (Vite)
        run: npm run build
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@0ca16172ca884f0a37117fed41734f29784cc980
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
